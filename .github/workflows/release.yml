name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build minified version
        run: npx terser trigons-lite.js --compress --mangle -o trigons-lite.min.js

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            trigons-lite.js
            trigons-lite.min.js
          generate_release_notes: true
